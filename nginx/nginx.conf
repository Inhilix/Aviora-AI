events {
    worker_processes auto;
}

http {
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_llm:10m    rate=3r/m;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Content-Type-Options    nosniff;
        add_header X-Frame-Options           DENY;
        add_header X-XSS-Protection          "1; mode=block";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';";

        location /api/auth/ {
            limit_req zone=api_auth burst=3 nodelay;
            limit_req_status 429;
            proxy_pass         http://fastapi:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/(sop|interview) {
            limit_req zone=api_llm burst=2 nodelay;
            limit_req_status 429;
            proxy_pass         http://fastapi:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;  # LLM endpoints can be slow
        }

        location /api/ {
            limit_req zone=api_general burst=10 nodelay;
            limit_req_status 429;
            proxy_pass         http://fastapi:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
        }

        # Grafana (internal access only — restrict by IP in production)
        location /grafana/ {
            proxy_pass http://grafana:3000/;
        }
    }
}
